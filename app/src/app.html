<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Jörg Lohrer – Blog (Nostr-basiert)" />
		<meta property="og:title" content="Jörg Lohrer – Blog" />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://svelte.joerg-lohrer.de/" />
		<meta property="og:description" content="Jörg Lohrer – Blog (Nostr-basiert)" />
		<meta name="robots" content="index, follow" />
		<title>Jörg Lohrer</title>
		<style>
			:root {
				--fg: #1f2937;
				--muted: #6b7280;
				--bg: #fafaf9;
				--accent: #2563eb;
				--code-bg: #f3f4f6;
				--border: #e5e7eb;
			}
			@media (prefers-color-scheme: dark) {
				:root {
					--fg: #e5e7eb;
					--muted: #9ca3af;
					--bg: #18181b;
					--accent: #60a5fa;
					--code-bg: #27272a;
					--border: #3f3f46;
				}
			}
			* {
				box-sizing: border-box;
			}
			html,
			body {
				margin: 0;
				padding: 0;
			}
			body {
				font:
					17px/1.55 -apple-system,
					BlinkMacSystemFont,
					'Segoe UI',
					Roboto,
					sans-serif;
				color: var(--fg);
				background: var(--bg);
			}
			a {
				color: var(--accent);
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
